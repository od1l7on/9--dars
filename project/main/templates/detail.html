{% extends 'base.html' %}

{% block title %}{{ car.name }}{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-10 col-lg-8">
        <a href="{% url 'home' %}" class="btn btn-link text-decoration-none mb-3 p-0 text-dark">← Orqaga qaytish</a>
        <div class="card border-0 shadow-lg rounded-4 overflow-hidden">
            <div class="row g-0">
                <div class="col-md-6 bg-white d-flex align-items-center justify-content-center p-3">
                    {% if car.image %}
                        <img src="{{ car.image.url }}" class="img-fluid rounded-3" alt="{{ car.name }}">
                    {% endif %}
                </div>
                <div class="col-md-6 bg-light">
                    <div class="card-body p-4">
                        <h6 class="text-uppercase text-primary fw-bold mb-1">{{ car.brand.name }}</h6>
                        <h1 class="fw-bold mb-3">{{ car.name }}</h1>
                        <h2 class="text-success mb-4">${{ car.price }}</h2>
                        <hr>
                        <p class="text-muted" style="min-height: 100px;">{{ car.description }}</p>
                        <div class="mt-4">
                            <button class="btn btn-primary btn-lg w-100 btn-rounded">Sotib olish</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
