{% extends 'base.html' %}

{% block title %}Mashina qo'shish{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card border-0 shadow-sm rounded-4 p-4 p-lg-5">
            <h2 class="fw-bold text-center mb-4">Yangi mashina qo'shish</h2>
            <form method="POST" enctype="multipart/form-data">
                {% csrf_token %}
                <div class="mb-3">
                    {{ form.as_p }}
                </div>
                <button type="submit" class="btn btn-warning w-100 btn-rounded fw-bold py-2 mt-3">Saqlash</button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
