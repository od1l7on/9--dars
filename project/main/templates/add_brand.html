{% extends 'base.html' %}

{% block title %}Brend qo'shish{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card border-0 shadow-sm rounded-4 p-4">
            <h2 class="fw-bold text-center mb-4">Yangi brend qo'shish</h2>
            <form method="POST">
                {% csrf_token %}
                <div class="mb-4">
                    {{ form.as_p }}
                </div>
                <button type="submit" class="btn btn-info w-100 btn-rounded fw-bold py-2">Brendni yaratish</button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
